services:
  app:
    build: .
    container_name: ipc_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: gemini-2.5-flash
    volumes:
      - model_cache:/root/.cache
      - C:/:/data/local/C:ro
      - D:/:/data/local/D:ro

volumes:
  model_cache:
